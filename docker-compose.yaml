services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    hostname: backend-host
    ports:
      - "8000:8000"
    networks:
      - app-networks

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    hostname: frontend-host
    environment:
      - BACKEND_URL=http://backend-host:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-networks

networks:
  app-networks: